services:
  # 1. Servidor Web Nginx
  web:
    image: nginx:latest
    ports:
      - "8085:80"
    volumes:
      - ./html:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
      - db

  # 2. Lenguaje PHP-FPM
  php:
    build:
      context: ./php
    volumes:
      - ./html:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./logs/php:/var/log/php
    depends_on:
      - db

  # 3. Base de Datos MariaDB
  db:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: RootPasswordSeguro!
      MYSQL_DATABASE: tec
      MYSQL_USER: tec
      MYSQL_PASSWORD: Tec123.
    volumes:
      - mariadb_data:/var/lib/mysql

  # 4. Administrador phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 128M
    depends_on:
      - db

volumes:
  mariadb_data: